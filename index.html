                              </div>

                              {/* Players Block */}
                              <div className="flex flex-col gap-3.5 mb-2">
                                <div className="flex items-center justify-between p-2 rounded-lg bg-black/5 dark:bg-white/5 border border-white/5">
                                   <div className={`flex items-center gap-2.5 ${t.text} font-bold text-sm`}>
                                     <span className="w-3.5 h-3.5 rounded-[4px] bg-white border border-gray-300 shadow-sm flex-shrink-0"></span> 
                                     <span className="truncate max-w-[120px]">{g.white.username}</span>
                                   </div>
                                   <span className={`text-xs font-bold ${t.textMuted} bg-black/10 dark:bg-white/10 px-2 py-0.5 rounded-md`}>({g.white.rating})</span>
                                </div>
                                <div className="flex items-center justify-between p-2 rounded-lg bg-black/5 dark:bg-white/5 border border-white/5">
                                   <div className={`flex items-center gap-2.5 ${t.text} font-bold text-sm`}>
                                     <span className="w-3.5 h-3.5 rounded-[4px] bg-gray-900 border border-black shadow-sm flex-shrink-0"></span> 
                                     <span className="truncate max-w-[120px]">{g.black.username}</span>
                                   </div>
                                   <span className={`text-xs font-bold ${t.textMuted} bg-black/10 dark:bg-white/10 px-2 py-0.5 rounded-md`}>({g.black.rating})</span>
                                </div>
                              </div>

                              {/* Footer Stats */}
                              <div className={`mt-5 pt-3 border-t ${t.border} flex justify-between items-center text-[11px] ${t.textMuted} font-medium`}>
                                 <span className="flex items-center gap-1.5">
                                   <Activity size={12} /> Total Moves: <strong className={`${t.text} text-xs`}>{moveCount}</strong>
                                 </span>
                                 <span className="capitalize px-2 py-0.5 rounded bg-black/20 dark:bg-white/10 border border-white/5 font-bold tracking-wider">{g.rules}</span>
                              </div>
                              
                              {/* Hover Highlight Overlay */}
                              <div className={`absolute inset-0 opacity-0 group-hover:opacity-10 pointer-events-none transition-opacity duration-300 ${t.accent}`}></div>
                            </div>
                          );
                        })}
                     </div>
                   </div>
                 )}
              </div>
            ) : (
              <div className="flex flex-col lg:flex-row gap-4 lg:gap-8 h-full">
                
                {/* --- Left Column: Chess Board Area --- */}
                <div className="flex flex-col items-center justify-start lg:justify-center w-full lg:w-auto lg:shrink-0 lg:flex-1 h-full max-h-[850px]">
                  
                  <PlayerBanner 
                    name={fullGame.header().Black || 'Black Player'} 
                    rating={fullGame.header().BlackElo}
                    capturedPieces={mat.blackCapturedList}
                    advantage={mat.blackAdvantage}
                    isBottom={false}
                  />

                  {/* BOARD CONTAINER: ~23% smaller (max-w 500px instead of 650px) */}
                  <div className="flex w-full max-w-[500px] justify-center items-stretch">
                    {/* Left Eval Bar */}
                    <div className={`w-4 md:w-6 ${t.panelInner} mr-2 md:mr-3 rounded overflow-hidden flex flex-col relative border ${t.border} shadow-lg shrink-0`}>
                      <div className="w-full bg-black transition-all duration-300" style={{ height: `${Math.max(5, Math.min(95, 50 + (evaluation * 5)))}%` }}></div>
                      <div className="w-full bg-white flex-1 transition-all duration-300"></div>
                      <span className={`absolute ${evaluation > 0 ? 'bottom-1 text-black' : 'top-1 text-white'} w-full text-center text-[9px] md:text-[10px] font-bold`}>{Math.abs(evaluation).toFixed(1)}</span>
                    </div>

                    {/* THE CHESS BOARD */}
                    <div className="w-full aspect-square rounded shadow-2xl relative select-none shrink-0 border-4 border-transparent ring-2 ring-black/20 dark:ring-white/10">
                      
                      {/* Grid Background */}
                      <div className="grid grid-cols-8 grid-rows-8 w-full h-full absolute inset-0 z-0 rounded overflow-hidden">
                        {Array.from({length: 64}).map((_, i) => {
                          const r = Math.floor(i / 8);
                          const c = i % 8;
                          const sq = String.fromCharCode(97 + c) + (8 - r);
                          const isDark = (r + c) % 2 === 1;
                          const isSelected = selectedSquare === sq;
                          const isLastMoveStart = currentMoveIndex >= 0 && history[currentMoveIndex]?.from === sq;
                          const isLastMoveEnd = currentMoveIndex >= 0 && history[currentMoveIndex]?.to === sq;
                          
                          const cellColor = isDark ? bt.dark : bt.light;
                          const highlightColor = (isSelected || isLastMoveStart || isLastMoveEnd) ? 'bg-[#f5f682]/60' : '';

                          return (
                            <div key={`bg_${sq}`} className={`relative w-full h-full ${cellColor}`}>
                              {highlightColor && <div className={`absolute inset-0 ${highlightColor}`}></div>}
                              {c === 0 && <span className={`absolute top-0.5 left-1 text-[8px] md:text-[10px] font-bold z-0 ${isDark ? 'text-white/70' : 'text-black/50'}`}>{8 - r}</span>}
                              {r === 7 && <span className={`absolute bottom-0.5 right-1 text-[8px] md:text-[10px] font-bold z-0 ${isDark ? 'text-white/70' : 'text-black/50'}`}>{String.fromCharCode(97 + c)}</span>}
                            </div>
                          );
                        })}
                      </div>

                      {/* Engine Arrow SVG Layer (UNDER pieces) */}
                      <svg className="absolute inset-0 w-full h-full pointer-events-none z-10">
                        <defs>
                          <marker id="arrowhead" markerWidth="4" markerHeight="4" refX="2.8" refY="2" orient="auto">
                            <polygon points="0 0, 4 2, 0 4" fill={bestArrowColor} opacity="0.9" />
                          </marker>
                          <filter id="arrowShadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="1" dy="2" stdDeviation="2" floodOpacity="0.5" />
                          </filter>
                        </defs>
                        {bestMove && bestMove.length >= 4 && activeTab !== 'details' && (
                          <line 
                            x1={`${getSquareCoordinates(bestMove.substring(0,2)).x}%`} 
                            y1={`${getSquareCoordinates(bestMove.substring(0,2)).y}%`}
                            x2={`${getSquareCoordinates(bestMove.substring(2,4)).x}%`} 
                            y2={`${getSquareCoordinates(bestMove.substring(2,4)).y}%`}
                            stroke={bestArrowColor} strokeWidth="1.5%" strokeOpacity="0.85"
                            markerEnd="url(#arrowhead)"
                            strokeLinecap="round"
                            filter="url(#arrowShadow)"
                          />
                        )}
                      </svg>

                      {/* SMOOTH 0.7s Animated Pieces Layer */}
                      <div className="absolute inset-0 z-20 pointer-events-none">
                        {animatedPieces.map(p => {
                          const coords = getSquareCoordinates(p.sq);
                          return (
                            <img 
                              key={p.id}
                              src={`https://images.chesscomfiles.com/chess-themes/pieces/neo/150/${p.color}${p.type}.png`}
                              className={`absolute w-[12.5%] h-[12.5%] transition-all duration-[700ms] ease-in-out drop-shadow-md pointer-events-none ${selectedSquare === p.sq ? 'scale-110 -translate-y-1' : 'scale-90'}`}
                              style={{ left: `${coords.x - 6.25}%`, top: `${coords.y - 6.25}%` }}
                              alt={`${p.color}${p.type}`}
                              draggable={false}
                            />
                          );
                        })}
                      </div>

                      {/* Rating Badges Layer */}
                      <div className="absolute inset-0 w-full h-full pointer-events-none z-30">
                        {currentMoveIndex >= 0 && history[currentMoveIndex]?.quality && (
                          <div 
                            key={`live_badge_${currentMoveIndex}_${history[currentMoveIndex].quality.id}`} // Keys forces animation re-trigger on quality change
                            className="absolute w-5 h-5 md:w-6 md:h-6 rounded-full flex items-center justify-center text-white font-black text-[9px] md:text-[11px] border-[1.5px] border-white shadow-lg animate-pop transition-colors duration-300"
                            style={{ 
                              backgroundColor: history[currentMoveIndex].quality.color,
                              left: `${getSquareCoordinates(history[currentMoveIndex].to).x + 3}%`, 
                              top: `${getSquareCoordinates(history[currentMoveIndex].to).y - 6}%`,
                              transform: 'translate(-50%, -50%)'
                            }}
                          >
                            {history[currentMoveIndex].quality.icon}
                          </div>
                        )}
                      </div>

                      {/* INTERACTION GRID (z-50) catches all clicks smoothly */}
                      <div className="absolute inset-0 z-50 grid grid-cols-8 grid-rows-8 w-full h-full">
                        {Array.from({length: 64}).map((_, i) => {
                          const r = Math.floor(i / 8);
                          const c = i % 8;
                          const sq = String.fromCharCode(97 + c) + (8 - r);
                          const isValidMove = validTargetSquares.includes(sq);

                          return (
                            <div 
                              key={`interact_${sq}`} 
                              onClick={() => handleSquareClick(sq)} 
                              className="relative w-full h-full cursor-pointer hover:bg-black/10 dark:hover:bg-white/10 transition-colors"
                            >
                              {isValidMove && (
                                 <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                   <div className={`rounded-full ${currentBoard.get(sq) ? 'w-[90%] h-[90%] border-[5px] border-black/30 dark:border-white/40' : 'w-[30%] h-[30%] bg-black/20 dark:bg-white/30'}`}></div>
                                 </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>

                  <PlayerBanner 
                    name={fullGame.header().White || 'White Player'} 
                    rating={fullGame.header().WhiteElo}
                    capturedPieces={mat.whiteCapturedList}
                    advantage={mat.whiteAdvantage}
                    isBottom={true}
                  />

                  {/* Media Controls */}
                  <div className={`w-full max-w-[500px] mt-2 ${t.panelInner} rounded-xl flex items-center justify-between p-2 shadow-sm border ${t.border} lg:ml-8`}>
                    <div className={`flex items-center gap-1 ${t.textMuted}`}>
                      <button onClick={() => goToMove(-1)} className={`p-3 hover:bg-black/5 dark:hover:bg-white/5 rounded-lg transition-colors`}><ChevronsLeft size={20}/></button>
                      <button onClick={() => goToMove(currentMoveIndex - 1)} className={`p-3 hover:bg-black/5 dark:hover:bg-white/5 rounded-lg transition-colors`}><ChevronLeft size={20}/></button>
                    </div>
                    
                    <div className="flex flex-col items-center">
                      <div className={`font-bold text-xs uppercase tracking-widest ${t.text}`}>
                         Move {Math.max(0, Math.ceil((currentMoveIndex + 1) / 2))}
                      </div>
                      {branchStartIndex !== -1 && (
                        <button 
                          onClick={returnToMainLine} 
                          className="text-[10px] text-[#ca3431] hover:text-red-400 font-bold mt-0.5 flex items-center gap-1 uppercase tracking-wider bg-[#ca3431]/10 px-2 py-0.5 rounded transition-colors"
                        >
                          Return to Game
                        </button>
                      )}
                    </div>

                    <div className={`flex items-center gap-1 ${t.textMuted}`}>
                      <button onClick={() => goToMove(currentMoveIndex + 1)} className={`p-3 hover:bg-black/5 dark:hover:bg-white/5 rounded-lg transition-colors`}><ChevronRight size={20}/></button>
                      <button onClick={() => goToMove(history.length - 1)} className={`p-3 hover:bg-black/5 dark:hover:bg-white/5 rounded-lg transition-colors`}><ChevronsRight size={20}/></button>
                    </div>
                  </div>
                  <div className={`text-[10px] uppercase font-bold mt-3 opacity-50 ${t.textMuted}`}>
                    Use ← / → Arrow Keys to Navigate Moves
                  </div>
                </div>

                {/* --- Right Column: Analysis Panel --- */}
                <div className={`w-full lg:w-[400px] xl:w-[450px] ${t.panel} rounded-2xl flex flex-col h-[600px] lg:h-full overflow-hidden border ${t.border} shadow-2xl shrink-0 mt-6 lg:mt-0`}>
                  
                  <div className={`flex border-b ${t.border} shrink-0`}>
                     <button onClick={()=>setActiveTab('report')} className={`flex-1 py-4 text-xs uppercase font-bold border-b-2 ${activeTab==='report'?`border-[${t.accentText.split('-')[1]}] ${t.text}`:`border-transparent ${t.textMuted} hover:${t.text}`}`}>Report</button>
                     <button onClick={()=>setActiveTab('analysis')} className={`flex-1 py-4 text-xs uppercase font-bold border-b-2 ${activeTab==='analysis'?`border-[${t.accentText.split('-')[1]}] ${t.text}`:`border-transparent ${t.textMuted} hover:${t.text}`}`}>Analysis</button>
                     <button onClick={()=>setActiveTab('details')} className={`flex-1 py-4 text-xs uppercase font-bold border-b-2 ${activeTab==='details'?`border-[${t.accentText.split('-')[1]}] ${t.text}`:`border-transparent ${t.textMuted} hover:${t.text}`}`}>Details</button>
                     <button onClick={()=>{setView('home'); setHistory([]); setMainLine([]); setBranchStartIndex(-1);}} className={`flex-1 py-4 text-xs uppercase font-bold border-b-2 border-transparent ${t.textMuted} hover:${t.text}`}>Exit</button>
                  </div>

                  <div className="p-4 flex-1 overflow-y-auto custom-scrollbar relative">
                    
                    {activeTab === 'report' && gameMetrics && (
                      <div className="space-y-4 animate-in fade-in">
                        
                        {/* Header */}
                        <div className={`flex justify-between items-center px-4 py-2 ${t.panelInner} rounded-xl border ${t.border}`}>
                          <div className="text-xs font-bold flex flex-col"><span className={t.text}>{fullGame.header().White || 'White'}</span><span className={`${t.textMuted} font-normal`}>White</span></div>
                          <div className={`text-[10px] ${t.textMuted} bg-black/10 dark:bg-white/10 px-2 py-1 rounded-full uppercase font-bold`}>VS</div>
                          <div className="text-xs font-bold flex flex-col items-end"><span className={t.text}>{fullGame.header().Black || 'Black'}</span><span className={`${t.textMuted} font-normal`}>Black</span></div>
                        </div>

                        {/* Progress Bars for Accuracy & Rating */}
                        <div className="flex flex-col gap-3">
                           {/* Accuracy */}
                           <div className={`p-5 rounded-xl border ${t.border} ${t.panelInner} shadow-lg`}>
                              <div className="flex items-center justify-center gap-2 mb-4">
                                 <Target size={16} className={t.accentText}/> 
                                 <span className={`text-xs uppercase font-bold tracking-widest ${t.textMuted}`}>Accuracy</span>
                              </div>
                              <div className="flex gap-8">
                                 <ProgressBar label={fullGame.header().White || 'White'} value={gameMetrics.white.accuracy} isWhite={true} />
                                 <ProgressBar label={fullGame.header().Black || 'Black'} value={gameMetrics.black.accuracy} isWhite={false} />
                              </div>
                           </div>
                           
                           {/* Est Rating */}
                           <div className={`p-5 rounded-xl border ${t.border} ${t.panelInner} shadow-lg`}>
                              <div className="flex items-center justify-center gap-2 mb-4">
                                 <Activity size={16} className={t.accentText}/> 
                                 <span className={`text-xs uppercase font-bold tracking-widest ${t.textMuted}`}>Est. Rating</span>
                              </div>
                              <div className="flex gap-8">
                                 <ProgressBar label={fullGame.header().White || 'White'} value={gameMetrics.white.estimated} max={3000} isWhite={true} />
                                 <ProgressBar label={fullGame.header().Black || 'Black'} value={gameMetrics.black.estimated} max={3000} isWhite={false} />
                              </div>
                           </div>
                        </div>

                        <LiveEvalGraph />

                        {/* Real User Performance Metrics */}
                        <div className="flex gap-4">
                          <div className={`flex-1 ${t.panelInner} p-4 rounded-xl border ${t.border} flex flex-col justify-center items-center text-center shadow-lg hover:bg-white/5 transition-colors`}>
                            <Flame size={20} className="text-[#81b64c] mb-2 drop-shadow-[0_0_8px_rgba(129,182,76,0.8)]" />
                            <span className={`text-[10px] uppercase font-bold ${t.textMuted} tracking-wider`}>Your Top Moves</span>
                            <span className={`text-2xl font-black ${t.text} mt-1`}>{gameMetrics.userTopMoves}</span>
                          </div>
                          <div className={`flex-1 ${t.panelInner} p-4 rounded-xl border ${t.border} flex flex-col justify-center items-center text-center shadow-lg hover:bg-white/5 transition-colors`}>
                            <XCircle size={20} className="text-[#ca3431] mb-2 drop-shadow-[0_0_8px_rgba(202,52,49,0.8)]" />
                            <span className={`text-[10px] uppercase font-bold ${t.textMuted} tracking-wider`}>Your Mistakes</span>
                            <span className={`text-2xl font-black ${t.text} mt-1`}>{gameMetrics.userMistakes}</span>
                          </div>
                        </div>

                        {/* Meme Good/Bad Tables */}
                        <div className="flex flex-col xl:flex-row gap-4 mt-4">
                          <div className={`flex-1 ${t.panelInner} rounded-xl p-3 border ${t.border}`}>
                            <div className={`flex justify-between items-center mb-3 border-b ${t.border} pb-2`}>
                                <span className="text-[#81b64c] font-bold text-xs flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-[#81b64c]"></span> Good</span>
                                <div className={`flex gap-2 text-[10px] font-bold ${t.text}`}><span className={`bg-white text-black rounded-full w-4 h-4 flex items-center justify-center shadow-sm`}>w</span><span className={`bg-[#222] text-[#e3e3e3] border border-[#444] rounded-full w-4 h-4 flex items-center justify-center shadow-sm`}>b</span></div>
                            </div>
                            {[MOVE_TYPES.SIGMA, MOVE_TYPES.AWESOME, MOVE_TYPES.BEST, MOVE_TYPES.NICE, MOVE_TYPES.OK, MOVE_TYPES.THEORETICAL].map(mt => (
                              <div key={mt.id} className="flex justify-between items-center py-1.5 text-xs hover:bg-black/5 dark:hover:bg-white/5 rounded px-1 -mx-1 transition-colors">
                                 <span className="flex items-center gap-1 w-20" style={{color: mt.color}}>
                                   <span className="w-4 h-4 rounded-sm flex items-center justify-center text-[8px] text-white font-black shadow-sm" style={{backgroundColor: mt.color}}>{mt.icon}</span> {mt.label}
                                 </span>
                                 <span className={`font-bold ${t.text} w-6 text-center`}>{gameMetrics.white.counts[mt.id] || 0}</span>
                                 <span className={`font-bold ${t.textMuted} w-6 text-center`}>{gameMetrics.black.counts[mt.id] || 0}</span>
                              </div>
                            ))}
                          </div>

                          <div className={`flex-1 ${t.panelInner} rounded-xl p-3 border ${t.border}`}>
                            <div className={`flex justify-between items-center mb-3 border-b ${t.border} pb-2`}>
                                <span className="text-[#ca3431] font-bold text-xs flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-[#ca3431]"></span> Bad</span>
                                <div className={`flex gap-2 text-[10px] font-bold ${t.text}`}><span className={`bg-white text-black rounded-full w-4 h-4 flex items-center justify-center shadow-sm`}>w</span><span className={`bg-[#222] text-[#e3e3e3] border border-[#444] rounded-full w-4 h-4 flex items-center justify-center shadow-sm`}>b</span></div>
                            </div>
                            {[MOVE_TYPES.STRANGE, MOVE_TYPES.BAD, MOVE_TYPES.CLOWN].map(mt => (
                              <div key={mt.id} className="flex justify-between items-center py-1.5 text-xs hover:bg-black/5 dark:hover:bg-white/5 rounded px-1 -mx-1 transition-colors">
                                 <span className="flex items-center gap-1 w-20" style={{color: mt.color}}>
                                   <span className="w-4 h-4 rounded-sm flex items-center justify-center text-[8px] text-white font-black shadow-sm" style={{backgroundColor: mt.color}}>{mt.icon}</span> {mt.label}
                                 </span>
                                 <span className={`font-bold text-[#ca3431] w-6 text-center`}>{gameMetrics.white.counts[mt.id] || 0}</span>
                                 <span className={`font-bold ${t.textMuted} w-6 text-center`}>{gameMetrics.black.counts[mt.id] || 0}</span>
                              </div>
                            ))}
                          </div>
                        </div>

                        {/* Move List Section */}
                        <div className={`p-4 rounded-xl border ${t.border} ${t.panelInner}`}>
                          <div className="flex justify-between items-center mb-3">
                             <h4 className={`text-xs font-black uppercase ${t.textMuted}`}>Game Moves</h4>
                             <button onClick={() => setMovesExpanded(!movesExpanded)} className={`flex items-center gap-1 text-[10px] ${t.accentText} uppercase font-bold hover:brightness-125 transition-all`}>
                               {movesExpanded ? <Minimize2 size={12} /> : <Maximize2 size={12} />}
                               {movesExpanded ? 'Show Less' : 'Show All'}
                             </button>
                          </div>
                          <div className="flex flex-wrap gap-1.5 mt-2">
                            {mainLine.slice(0, movesExpanded ? mainLine.length : 10).map((m, i) => (
                               <div 
                                 key={i} 
                                 onClick={() => goToMove(i)} 
                                 className={`cursor-pointer flex items-center gap-1 text-[11px] px-2 py-1.5 rounded-lg border ${currentMoveIndex === i ? `bg-[${t.accentText.split('-')[1]}]/20 border-[${t.accentText.split('-')[1]}]` : `bg-black/20 dark:bg-white/5 border-white/5`} hover:border-gray-400 transition-colors shadow-sm`}
                               >
                                  <span className={t.textMuted}>{m.color==='w' ? `${Math.floor(i/2)+1}.` : ''}</span>
                                  <span className={`${t.text} font-bold`}>{m.san}</span>
                                  {m.quality && m.quality.id !== 'ok' && m.quality.id !== 'theoretical' && (
                                    <span style={{color: m.quality.color}} className="font-black text-[10px] ml-0.5">{m.quality.icon}</span>
                                  )}
                               </div>
                            ))}
                          </div>
                        </div>

                      </div>
                    )}

                    {activeTab === 'analysis' && (
                      <div className="space-y-4 animate-in fade-in">
                        <div className={`p-4 rounded-xl border ${t.border} ${t.panelInner}`}>
                          <p className={`text-xs ${t.textMuted} mb-4 flex items-center justify-between`}>
                            <span>Stockfish 10.0 • Depth 12</span>
                            {analyzing && <span className={`text-[10px] ${t.accentText} flex items-center gap-1`}><Loader2 size={10} className="animate-spin"/> Calc...</span>}
                          </p>
                          <div className="flex items-center justify-between">
                             <span className={`text-3xl font-mono font-black ${t.text}`}>{evaluation > 0 ? `+${Number(evaluation).toFixed(2)}` : Number(evaluation).toFixed(2)}</span>
                             {bestMove && <span className="bg-[#81b64c]/20 text-[#81b64c] px-3 py-1 rounded font-bold text-sm uppercase">{bestMove}</span>}
                          </div>
                        </div>
                        
                        <div className={`p-4 rounded-xl border ${t.border} ${t.panelInner}`}>
                          <h4 className={`text-xs font-black uppercase mb-4 flex items-center gap-2 ${t.textMuted}`}>
                            <Activity size={14} /> Engine Top Lines
                          </h4>
                          {engineLines.filter(Boolean).length > 0 ? (
                            <div className="space-y-3">
                              {engineLines.filter(Boolean).map((line, i) => (
                                <div key={i} className={`flex items-center gap-4 p-2 rounded-lg ${i===0 ? `border ${t.border} ${t.panel}` : ''}`}>
                                  <span className={`w-12 text-center font-mono text-xs font-bold ${Number(line.eval) >= 0 ? 'text-green-500' : 'text-red-500'}`}>
                                    {Number(line.eval) > 0 ? `+${Number(line.eval).toFixed(2)}` : Number(line.eval).toFixed(2)}
                                  </span>
                                  <span className={`font-bold text-sm ${t.text}`}>{line.move}</span>
                                  {i===0 && <span className={`text-[9px] uppercase font-black px-2 py-0.5 rounded ${t.accent} ${appTheme==='neon'?'text-black':'text-white'}`}>Best</span>}
                                </div>
                              ))}
                            </div>
                          ) : (
                            <div className={`flex items-center gap-3 ${t.textMuted} text-xs font-medium italic`}>Waiting for position...</div>
                          )}
                        </div>
                        
                        <div className={`p-4 rounded-xl border border-[#81b64c]/50 ${t.panelInner} bg-[#81b64c]/5`}>
                          <p className={`text-xs ${t.textMuted}`}><strong>Free Play Active:</strong> Click any piece on the board to test custom variations. Stockfish will evaluate automatically.</p>
                        </div>
                      </div>
                    )}

                    {/* --- TAB: DETAILS --- */}
                    {activeTab === 'details' && (
                      <div className="space-y-4 animate-in fade-in duration-300">
                         <div className={`p-4 rounded-xl border ${t.border} ${t.panelInner} space-y-3`}>
                           {Object.entries(fullGame.header()).map(([key, val]) => (
                             <div key={key} className={`flex justify-between items-center border-b ${t.border} pb-2 last:border-0 last:pb-0`}>
                               <span className={`text-xs font-bold ${t.textMuted}`}>{key}</span>
                               <span className={`text-xs font-medium ${t.text}`}>{typeof val === 'object' ? JSON.stringify(val) : String(val)}</span>
                             </div>
                           ))}
                         </div>
                         <div className={`p-4 rounded-xl border ${t.border} ${t.panelInner}`}>
                           <h4 className={`text-xs font-black uppercase mb-2 ${t.textMuted}`}>Raw PGN</h4>
                           <p className={`text-[10px] ${t.textMuted} font-mono break-all leading-relaxed`}>
                             {fullGame.pgn()}
                           </p>
                         </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}
          </div>
          
          {/* Custom Footer */}
          <footer className={`w-full py-6 mt-auto text-center ${t.textMuted} flex flex-col items-center justify-center z-50 relative border-t ${t.border}`}>
            <div className="flex items-center gap-1.5 text-sm font-medium">
              Made with <Heart size={16} className="text-red-500 fill-red-500 animate-pulse drop-shadow-[0_0_10px_rgba(239,68,68,0.8)] mx-0.5" /> by
              <a href="https://github.com/Rush1patel" target="_blank" rel="noopener noreferrer" className={`flex items-center gap-1.5 ml-1 text-[#e3e3e3] hover:${t.accentText} transition-colors font-bold group`}>
                <Github size={16} className="group-hover:scale-110 group-hover:-rotate-6 transition-transform" /> Rush1patel
              </a>
            </div>
          </footer>

        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
