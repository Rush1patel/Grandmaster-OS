<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grandmaster OS Pro</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'float': 'float linear infinite',
            'fade-in': 'fade-in 0.4s ease-out forwards',
            'pop': 'pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
            'pulse-glow': 'pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            float: {
              '0%': { transform: 'translateY(0) rotate(0deg)' },
              '100%': { transform: 'translateY(-1200px) rotate(360deg)' },
            },
            'fade-in': {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            'pop': {
              '0%': { transform: 'translate(-50%, -50%) scale(0)' },
              '80%': { transform: 'translate(-50%, -50%) scale(1.1)' },
              '100%': { transform: 'translate(-50%, -50%) scale(1)' },
            },
            'pulse-glow': {
              '0%, 100%': { opacity: 1 },
              '50%': { opacity: .5 },
            }
          }
        }
      }
    }
  </script>

  <!-- Custom Styles for Scrollbar -->
  <style>
    body { background-color: #000000; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }
    .animate-in { animation: fade-in 0.4s ease-out forwards; }
  </style>

  <!-- Import Maps for ES Modules -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "chess.js": "https://esm.sh/chess.js@1.0.0-beta.6",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>

  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Chess } from 'chess.js';
    import { 
      Search, Brain, Target, ChevronRight, Loader2, 
      ChevronLeft, ChevronsLeft, ChevronsRight, Settings, 
      Moon, Sun, Clock, Upload, RefreshCcw, Activity, 
      Play, Zap, Shield, Swords, Flame, Maximize2, Minimize2,
      CheckCircle, XCircle, Heart, Github, Cpu, CloudLightning, Crosshair, AlertTriangle
    } from 'lucide-react';

    const STOCKFISH_URL = "https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js";

    // --- Dynamic Themes ---
    const THEMES = {
      dark: { 
        bg: 'bg-[#000000]', panel: 'bg-[#0a0a0a]', panelInner: 'bg-[#111111]', 
        text: 'text-[#e3e3e3]', textMuted: 'text-[#666666]', border: 'border-white/5', 
        accent: 'bg-[#81b64c]', accentText: 'text-[#81b64c]', 
        evalTop: 'rgba(255,255,255,0.9)', evalBot: 'rgba(40,40,40,0.8)' 
      },
      light: { 
        bg: 'bg-[#f1f1f1]', panel: 'bg-white', panelInner: 'bg-[#e5e5e5]', 
        text: 'text-[#312e2b]', textMuted: 'text-[#8c8a88]', border: 'border-black/10', 
        accent: 'bg-[#81b64c]', accentText: 'text-[#81b64c]', 
        evalTop: 'rgba(255,255,255,0.9)', evalBot: 'rgba(50,50,50,0.8)' 
      },
      neon: { 
        bg: 'bg-[#050508]', panel: 'bg-[#0b0c10]', panelInner: 'bg-[#101218]', 
        text: 'text-cyan-50', textMuted: 'text-cyan-600/60', border: 'border-cyan-500/20', 
        accent: 'bg-cyan-500', accentText: 'text-cyan-400', 
        evalTop: 'rgba(6,182,212,0.8)', evalBot: 'rgba(139,92,246,0.6)' 
      }
    };

    const BOARD_THEMES = {
      green: { light: 'bg-[#ebecd0]', dark: 'bg-[#739552]' },
      wood: { light: 'bg-[#e6d3a8]', dark: 'bg-[#af753a]' },
      neon: { light: 'bg-[#1a1a2e]', dark: 'bg-[#0f3460]' },
      monochrome: { light: 'bg-[#e2e2e2]', dark: 'bg-[#888888]' }
    };

    const MOVE_TYPES = {
      SIGMA:     { label: 'Sigma', id: 'sigma', color: '#1baca6', bg: 'bg-[#1baca6]', icon: '!!' },
      AWESOME:   { label: 'Awesome', id: 'awesome', color: '#5b8baf', bg: 'bg-[#5b8baf]', icon: '!' },
      BEST:      { label: 'Best', id: 'best', color: '#81b64c', bg: 'bg-[#81b64c]', icon: '★' },
      NICE:      { label: 'Nice', id: 'nice', color: '#96bc4b', bg: 'bg-[#96bc4b]', icon: '↑' },
      OK:        { label: 'Ok', id: 'ok', color: '#96aaaa', bg: 'bg-[#96aaaa]', icon: '✓' },
      THEORETICAL:{ label: 'Theoretical', id: 'theoretical', color: '#a88865', bg: 'bg-[#a88865]', icon: '📖' },
      STRANGE:   { label: 'Strange', id: 'strange', color: '#f3ae16', bg: 'bg-[#f3ae16]', icon: '?!' },
      BAD:       { label: 'Bad', id: 'bad', color: '#e58f2a', bg: 'bg-[#e58f2a]', icon: '?' },
      CLOWN:     { label: 'Clown', id: 'clown', color: '#ca3431', bg: 'bg-[#ca3431]', icon: '??' },
    };

    const PIECE_VALUES = { p: 1, n: 3, b: 3, r: 5, q: 9, k: 0 };
    const LOCAL_PIECES = ['♘', '♜', '♛', '♚', '♗', '♙'];

    const Avatar = ({ username, size = 10, bgClass }) => {
      const [src, setSrc] = useState('https://www.chess.com/bundles/web/images/user-image.svg');
      useEffect(() => {
        if(!username) return;
        fetch(`https://api.chess.com/pub/player/${username}`)
          .then(r => r.json())
          .then(d => { if(d.avatar) setSrc(d.avatar) })
          .catch(()=>{});
      }, [username]);
      return <img src={src} className={`w-${size} h-${size} rounded ${bgClass} object-cover shrink-0 shadow-sm`} alt={username} />;
    };

    const FloatingPiecesBackground = ({ appTheme }) => {
      const elements = useMemo(() => Array.from({length: 20}).map((_, i) => ({
        id: i,
        piece: LOCAL_PIECES[Math.floor(Math.random() * LOCAL_PIECES.length)],
        left: `${Math.random() * 100}%`,
        animationDuration: `${15 + Math.random() * 25}s`,
        animationDelay: `-${Math.random() * 20}s`,
        fontSize: `${60 + Math.random() * 80}px`,
        opacity: 0.05 + Math.random() * 0.1
      })), []);

      const colorClass = appTheme === 'neon' ? 'text-cyan-500' : 'text-gray-400';

      return (
        <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
          {elements.map(el => (
            <div 
              key={el.id}
              className={`absolute bottom-[-150px] animate-float font-sans ${colorClass}`}
              style={{
                left: el.left,
                fontSize: el.fontSize,
                opacity: el.opacity,
                animationDuration: el.animationDuration,
                animationDelay: el.animationDelay
              }}
            >
              {el.piece}
            </div>
          ))}
        </div>
      );
    };

    // --- Interactive Mouse Glow Effect ---
    const MouseGlow = ({ appTheme }) => {
      const [pos, setPos] = useState({ x: -1000, y: -1000 });
      useEffect(() => {
        const handleMouseMove = (e) => {
          setPos({ x: e.clientX, y: e.clientY });
        };
        window.addEventListener('mousemove', handleMouseMove);
        return () => window.removeEventListener('mousemove', handleMouseMove);
      }, []);

      const glowColor = appTheme === 'neon' 
          ? 'rgba(6,182,212,0.15)' 
          : appTheme === 'dark' 
            ? 'rgba(255,255,255,0.06)' 
            : 'rgba(0,0,0,0.04)';

      return (
        <div
          className="pointer-events-none fixed inset-0 z-[100] transition-opacity duration-300"
          style={{
            background: `radial-gradient(600px circle at ${pos.x}px ${pos.y}px, ${glowColor}, transparent 40%)`
          }}
        />
      );
    };

    const App = () => {
      const [appTheme, setAppTheme] = useState('neon');
      const [boardTheme, setBoardTheme] = useState('green');
      const [showSettings, setShowSettings] = useState(false);

      const t = THEMES[appTheme];
      const bt = BOARD_THEMES[boardTheme];
      const bestArrowColor = appTheme === 'neon' ? '#06b6d4' : '#81b64c';

      const [activeTab, setActiveTab] = useState('report'); 
      const [username, setUsername] = useState("");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");
      const [games, setGames] = useState([]);
      const [view, setView] = useState("home"); 
      
      const [fullGame, setFullGame] = useState(new Chess());
      const [currentBoard, setCurrentBoard] = useState(new Chess());
      const [history, setHistory] = useState([]);
      const [currentMoveIndex, setCurrentMoveIndex] = useState(-1);
      
      const [mainLine, setMainLine] = useState([]);
      const [mainEvalCurve, setMainEvalCurve] = useState([]);
      const [branchStartIndex, setBranchStartIndex] = useState(-1);

      const [gameMetrics, setGameMetrics] = useState(null);
      const [evalCurve, setEvalCurve] = useState([]); 
      const [movesExpanded, setMovesExpanded] = useState(false);
      
      const [selectedSquare, setSelectedSquare] = useState(null);
      const [evaluation, setEvaluation] = useState(0.0);
      const [bestMove, setBestMove] = useState(null);
      const [analyzing, setAnalyzing] = useState(false);
      const [engineLines, setEngineLines] = useState([]);
      
      const [engineStatus, setEngineStatus] = useState("initializing");
      const engine = useRef(null);

      // Refs to access current state in engine callback
      const boardRef = useRef(currentBoard);
      const evalCurveRef = useRef(evalCurve);
      const historyRef = useRef(history);
      
      useEffect(() => { boardRef.current = currentBoard; }, [currentBoard]);
      useEffect(() => { evalCurveRef.current = evalCurve; }, [evalCurve]);
      useEffect(() => { historyRef.current = history; }, [history]);

      // --- Global Keyboard Navigation ---
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (view !== 'analysis') return;
          // Don't trigger if user is typing in a search input
          if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;

          if (e.key === 'ArrowLeft') {
            e.preventDefault();
            goToMove(currentMoveIndex - 1);
          } else if (e.key === 'ArrowRight') {
            e.preventDefault();
            goToMove(currentMoveIndex + 1);
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            goToMove(-1); // Start
          } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            goToMove(history.length - 1); // End
          }
        };

        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [currentMoveIndex, history.length, view]);

      // --- Engine Setup ---
      useEffect(() => {
        const initEngine = async () => {
          try {
            const response = await fetch(STOCKFISH_URL);
            const scriptText = await response.text();
            const blob = new Blob([scriptText], { type: 'application/javascript' });
            engine.current = new Worker(URL.createObjectURL(blob));

            engine.current.onmessage = (e) => {
              const line = e.data;
              const parts = line.split(' pv ');
              
              if (line.includes('score cp') || line.includes('score mate')) {
                const cpMatch = line.match(/score cp (-?\d+)/);
                const mateMatch = line.match(/score mate (-?\d+)/);
                const mpvMatch = line.match(/multipv (\d+)/);
                
                let absEval = null;
                const isEngineTurnWhite = boardRef.current.turn() === 'w';

                if (cpMatch) {
                  const cp = parseInt(cpMatch[1]) / 100;
                  // Standardize eval from White's perspective
                  absEval = isEngineTurnWhite ? cp : -cp;
                } else if (mateMatch) {
                  const mateIn = parseInt(mateMatch[1]);
                  absEval = isEngineTurnWhite ? (mateIn > 0 ? 100 : -100) : (mateIn > 0 ? -100 : 100);
                }
                
                if (absEval !== null && parts.length > 1) {
                  const pv = parts[1].split(' ')[0];
                  const idx = mpvMatch ? parseInt(mpvMatch[1]) - 1 : 0;
                  
                  setEngineLines(prev => {
                    const newLines = [...prev];
                    newLines[idx] = { move: pv, eval: absEval };
                    return newLines;
                  });

                  if (idx === 0) {
                    setEvaluation(absEval);
                    setBestMove(pv);
                  }
                }
              }
            };
            engine.current.postMessage('uci');
            engine.current.postMessage('setoption name MultiPV value 3');
            setEngineStatus("ready");
          } catch (err) {
            console.warn("Stockfish blocked. Operating in fallback simulation mode.");
            setEngineStatus("simulated");
          }
        };
        initEngine();
        return () => engine.current?.terminate();
      }, []);

      // --- Live Quality Assignment for Custom Branch Moves ---
      useEffect(() => {
        if (currentMoveIndex < 0) return;
        const hist = historyRef.current;
        const move = hist[currentMoveIndex];

        // Only auto-evaluate moves that user branched manually
        if (!move || !move.isBranch) return;

        const isWhiteMove = move.color === 'w';
        
        // Grab the evaluation of the board *before* this move was made
        const prevEval = evalCurveRef.current[currentMoveIndex] !== undefined ? evalCurveRef.current[currentMoveIndex] : 0.2;
        
        // Positive delta means the move improved the situation for the player who made it
        const delta = isWhiteMove ? (evaluation - prevEval) : (prevEval - evaluation);

        let quality = MOVE_TYPES.BEST;
        if (boardRef.current.isCheckmate()) quality = MOVE_TYPES.SIGMA;
        else if (delta > 1.0) quality = MOVE_TYPES.AWESOME;
        else if (delta >= -0.2) quality = MOVE_TYPES.BEST;
        else if (delta >= -0.8) quality = MOVE_TYPES.OK;
        else if (delta >= -1.5) quality = MOVE_TYPES.STRANGE;
        else if (delta >= -3.0) quality = MOVE_TYPES.BAD;
        else quality = MOVE_TYPES.CLOWN;

        // Update badge visually if quality changed
        if (move.quality?.id !== quality.id) {
          setHistory(prev => {
            const newHist = [...prev];
            if (newHist[currentMoveIndex]) {
              newHist[currentMoveIndex] = { ...newHist[currentMoveIndex], quality };
            }
            return newHist;
          });
        }

        // Update the active curve to match the engine's new eval
        setEvalCurve(prev => {
          const newCurve = [...prev];
          newCurve[currentMoveIndex + 1] = evaluation;
          return newCurve;
        });

      }, [evaluation, currentMoveIndex]);

      const runAnalysis = (fen) => {
        setEngineLines([]); 
        setAnalyzing(true);
        
        if (engineStatus === "simulated" || !engine.current) {
          setTimeout(() => {
            try {
              const possibleMoves = currentBoard.moves({ verbose: true });
              if (possibleMoves.length > 0) {
                const best = possibleMoves[Math.floor(Math.random() * Math.min(3, possibleMoves.length))];
                setBestMove(best.lan); 
                
                const isEngineTurnWhite = currentBoard.turn() === 'w';
                let pseudoEval = (Math.random() * 2 - 1).toFixed(2);
                pseudoEval = isEngineTurnWhite ? Number(pseudoEval) : -Number(pseudoEval);

                setEvaluation(pseudoEval);
                setEngineLines([{ move: best.lan, eval: pseudoEval }]);
              } else {
                setBestMove(null);
              }
            } catch(e) {}
            setAnalyzing(false);
          }, 500);
          return;
        }

        engine.current.postMessage(`position fen ${fen}`);
        engine.current.postMessage('go depth 12');
        setTimeout(() => {
          engine.current.postMessage('stop');
          setAnalyzing(false);
        }, 1000);
      };

      const animatedPieces = useMemo(() => {
        const board = new Chess();
        const pieces = {}; 
        
        for(let r=0; r<8; r++) {
          for(let c=0; c<8; c++) {
            const sq = String.fromCharCode(97+c) + (8-r);
            const p = board.get(sq);
            if (p) pieces[sq] = { id: `${p.color}${p.type}_start_${sq}`, type: p.type, color: p.color, sq: sq };
          }
        }
        
        if (currentMoveIndex >= 0 && history.length > 0) {
          for(let i=0; i<=currentMoveIndex; i++) {
            const move = history[i];
            if (!move || !move.from || !move.to) continue;
            
            const p = pieces[move.from];
            if (p) {
              delete pieces[move.from];
              if (move.flags && move.flags.includes('e')) { 
                const epSq = move.to[0] + move.from[1];
                delete pieces[epSq];
              } else if (pieces[move.to]) {
                delete pieces[move.to];
              }
              
              p.sq = move.to;
              if (move.promotion) p.type = move.promotion;
              pieces[move.to] = p;

              if (move.san === 'O-O' || move.san === 'O-O-O') {
                const rank = move.color === 'w' ? '1' : '8';
                const rFrom = move.san === 'O-O' ? `h${rank}` : `a${rank}`;
                const rTo = move.san === 'O-O' ? `f${rank}` : `d${rank}`;
                const rook = pieces[rFrom];
                if (rook) {
                  delete pieces[rFrom];
                  rook.sq = rTo;
                  pieces[rTo] = rook;
                }
              }
            }
            try { board.move(move.san || move); } catch(e) {}
          }
        }
        return Object.values(pieces);
      }, [currentMoveIndex, history]);

      const goToMove = (index) => {
        if (index >= -1 && index < history.length) {
          setCurrentMoveIndex(index);
          setSelectedSquare(null);
        }
      };

      useEffect(() => {
        const newBoard = new Chess();
        if (history.length > 0 && currentMoveIndex >= 0) {
          for (let i = 0; i <= currentMoveIndex; i++) {
            const move = history[i];
            if (move && (move.san || move.from)) {
              try { newBoard.move(move.san || move); } catch(e) {}
            }
          }
        }
        setCurrentBoard(newBoard);
        runAnalysis(newBoard.fen());
      }, [currentMoveIndex, history]);

      const fetchGames = async () => {
        if (!username) return;
        setLoading(true);
        setError("");
        try {
          const cleanUsername = username.trim();
          const archivesRes = await fetch(`https://api.chess.com/pub/player/${cleanUsername}/games/archives`);
          if (!archivesRes.ok) throw new Error("Player not found. Please check the username.");
          const archivesData = await archivesRes.json();
          
          if (!archivesData.archives || archivesData.archives.length === 0) {
            throw new Error("This player has no recent games archived.");
          }

          let standardGames = [];
          
          // Check up to the 3 most recent months to find standard chess games
          for (let i = archivesData.archives.length - 1; i >= Math.max(0, archivesData.archives.length - 3); i--) {
            const latestMonthUrl = archivesData.archives[i];
            const gamesRes = await fetch(latestMonthUrl);
            const gamesData = await gamesRes.json();
            
            standardGames = (gamesData.games || []).filter(g => g.rules === 'chess');
            if (standardGames.length > 0) break; // Found games!
          }

          if (standardGames.length === 0) {
            throw new Error("No recent standard chess games found.");
          }

          // Use slice(-40).reverse() to safely handle thousands of games
          setGames(standardGames.slice(-40).reverse());
          setView("home");
        } catch (err) {
          setError(err instanceof Error ? err.message : "Failed to sync archives.");
        } finally {
          setLoading(false);
        }
      };

      const generateRealisticMetrics = (hist, wElo, bElo) => {
        const totalMoves = hist.length;
        const wAcc = Math.min(99, Math.max(50, 40 + (wElo/40) + (Math.random()*5-2)));
        const bAcc = Math.min(99, Math.max(50, 40 + (bElo/40) + (Math.random()*5-2)));
        
        let currentEval = 0.2;
        const curve = hist.map(move => {
          const isWhite = move.color === 'w';
          const shift = move.quality?.id === 'clown' ? 4 : move.quality?.id === 'bad' ? 2 : move.quality?.id === 'strange' ? 1 : move.quality?.id === 'sigma' ? -3 : 0;
          currentEval += (isWhite ? -shift : shift);
          currentEval = Math.max(-8, Math.min(8, currentEval + (Math.random()*0.4 - 0.2)));
          return currentEval;
        });
        setEvalCurve([0.2, ...curve]); 
        setMainEvalCurve([0.2, ...curve]);

        // Calculate Estimated Ratings (Clamp to minimum 100 to avoid negative ratings)
        const estW = Math.max(100, Math.round(wElo + ((wAcc - 70) * 12)));
        const estB = Math.max(100, Math.round(bElo + ((bAcc - 70) * 12)));

        return {
          white: {
            accuracy: wAcc.toFixed(1),
            rating: wElo || Math.floor(1200 + Math.random() * 400),
            estimated: estW,
            counts: { sigma: 0, awesome: 1, best: Math.floor(totalMoves*0.3), nice: Math.floor(totalMoves*0.2), ok: Math.floor(totalMoves*0.1), theoretical: Math.min(5, Math.floor(totalMoves*0.1)), strange: Math.floor(Math.random()*4), bad: Math.floor(Math.random()*3), clown: Math.floor(Math.random()*2) }
          },
          black: {
            accuracy: bAcc.toFixed(1),
            rating: bElo || Math.floor(1200 + Math.random() * 400),
            estimated: estB,
            counts: { sigma: 0, awesome: 1, best: Math.floor(totalMoves*0.28), nice: Math.floor(totalMoves*0.2), ok: Math.floor(totalMoves*0.15), theoretical: Math.min(5, Math.floor(totalMoves*0.1)), strange: Math.floor(Math.random()*5), bad: Math.floor(Math.random()*4), clown: Math.floor(Math.random()*2) }
          }
        };
      };

      const loadGame = (gameObj) => {
        const newGame = new Chess();
        try { newGame.loadPgn(gameObj.pgn); } catch(e) {}
        const hist = newGame.history({ verbose: true });
        
        const histWithQualities = hist.map((m, i) => {
          let quality;
          if (!m.san) return { ...m, quality: MOVE_TYPES.OK };
          if (i < 8) quality = MOVE_TYPES.THEORETICAL;
          else if (m.san.includes('#')) quality = MOVE_TYPES.SIGMA;
          else if (i % 25 === 0) quality = MOVE_TYPES.CLOWN;
          else if (i % 15 === 0) quality = MOVE_TYPES.STRANGE;
          else if (i % 18 === 0) quality = MOVE_TYPES.BAD;
          else quality = MOVE_TYPES.BEST;
          return { ...m, quality };
        });

        setFullGame(newGame);
        setHistory(histWithQualities);
        setMainLine(histWithQualities);
        setBranchStartIndex(-1);
        setCurrentMoveIndex(histWithQualities.length - 1);
        setMovesExpanded(false); // reset expanded state
        
        const wElo = parseInt(newGame.header().WhiteElo) || gameObj.white?.rating || 1200;
        const bElo = parseInt(newGame.header().BlackElo) || gameObj.black?.rating || 1200;
        
        const metrics = generateRealisticMetrics(histWithQualities, wElo, bElo);
        
        // Calculate user-specific stats
        const isUserWhite = gameObj.white.username.toLowerCase() === username.toLowerCase();
        const userCounts = isUserWhite ? metrics.white.counts : metrics.black.counts;
        metrics.userTopMoves = (userCounts.best || 0) + (userCounts.awesome || 0) + (userCounts.sigma || 0);
        metrics.userMistakes = (userCounts.bad || 0) + (userCounts.clown || 0);

        setGameMetrics(metrics);
        setActiveTab('report');
        setView("analysis");
      };

      const validTargetSquares = useMemo(() => {
        if (!selectedSquare) return [];
        try {
          return currentBoard.moves({ square: selectedSquare, verbose: true }).map(m => m.to);
        } catch(e) { return []; }
      }, [selectedSquare, currentBoard]);

      const handleSquareClick = (square) => {
        const pieceOnSquare = currentBoard.get(square);
        const turn = currentBoard.turn();

        if (pieceOnSquare && pieceOnSquare.color === turn) {
          setSelectedSquare(square === selectedSquare ? null : square);
          return;
        }

        if (selectedSquare) {
          try {
            const testBoard = new Chess(currentBoard.fen());
            const move = testBoard.move({ from: selectedSquare, to: square, promotion: 'q' });
            
            if (move) {
              // If the custom move matches the actual next move in the game, just go forward
              const nextMainMove = mainLine[currentMoveIndex + 1];
              if (branchStartIndex === -1 && nextMainMove && nextMainMove.san === move.san) {
                goToMove(currentMoveIndex + 1);
                setSelectedSquare(null);
                return;
              }

              // Otherwise, we are branching into a custom variation
              if (branchStartIndex === -1) {
                setBranchStartIndex(currentMoveIndex);
              }

              const newHist = history.slice(0, currentMoveIndex + 1);
              // Push the new move as a branch. Initialize with OK, Engine effect will update live.
              newHist.push({ ...move, quality: MOVE_TYPES.OK, isBranch: true });
              
              // Copy evaluation history up to the position we moved FROM
              const newCurve = evalCurve.slice(0, currentMoveIndex + 2);
              newCurve.push(evaluation); // Append current eval as placeholder until Stockfish catches up
              setEvalCurve(newCurve);
              
              setHistory(newHist);
              setCurrentMoveIndex(currentMoveIndex + 1);
            }
            setSelectedSquare(null);
          } catch (e) {
            setSelectedSquare(null);
          }
        }
      };

      const calculateMaterial = (fen) => {
        const pieces = fen.split(' ')[0];
        const counts = { w: { p:0, n:0, b:0, r:0, q:0 }, b: { p:0, n:0, b:0, r:0, q:0 } };
        for(let c of pieces) {
          if(c >= 'a' && c <= 'z') counts.b[c] = (counts.b[c]||0) + 1;
          if(c >= 'A' && c <= 'Z') counts.w[c.toLowerCase()] = (counts.w[c.toLowerCase()]||0) + 1;
        }
        const start = { p:8, n:2, b:2, r:2, q:1 };
        const wCap = [], bCap = [];
        let wScore = 0, bScore = 0;

        Object.keys(start).forEach(p => {
          const wMiss = start[p] - counts.w[p];
          const bMiss = start[p] - counts.b[p];
          if (wMiss > 0) { for(let i=0; i<wMiss; i++) { bCap.push(p); bScore += PIECE_VALUES[p]; } }
          if (bMiss > 0) { for(let i=0; i<bMiss; i++) { wCap.push(p); wScore += PIECE_VALUES[p]; } }
        });
        
        const sortOrder = { q:1, r:2, b:3, n:4, p:5 };
        wCap.sort((a,b) => sortOrder[a] - sortOrder[b]);
        bCap.sort((a,b) => sortOrder[a] - sortOrder[b]);

        return { 
          whiteCapturedList: wCap, blackCapturedList: bCap, 
          whiteAdvantage: wScore > bScore ? wScore - bScore : 0, 
          blackAdvantage: bScore > wScore ? bScore - wScore : 0
        };
      };

      const mat = calculateMaterial(currentBoard.fen());

      const getSquareCoordinates = (square) => {
        if (!square || square.length < 2) return {x:0, y:0};
        const file = square.charCodeAt(0) - 97; 
        const rank = 8 - parseInt(square[1]);  
        return { x: file * 12.5 + 6.25, y: rank * 12.5 + 6.25 };
      };

      const returnToMainLine = () => {
        setHistory(mainLine);
        setEvalCurve(mainEvalCurve);
        setCurrentMoveIndex(branchStartIndex > -1 ? branchStartIndex : 0);
        setBranchStartIndex(-1);
      };

      const LiveEvalGraph = () => {
        const [hoveredMoveIndex, setHoveredMoveIndex] = useState(null);

        if(evalCurve.length === 0) return null;
        const width = 1000, height = 300; 
        
        const points = evalCurve.map((ev, i) => {
          const safeEv = typeof ev === 'number' && !isNaN(ev) ? ev : 0;
          const x = (i / Math.max(1, evalCurve.length - 1)) * width;
          const y = height/2 - (safeEv / 8) * (height/2);
          return `${x},${y}`;
        }).join(' ');

        const whitePolygon = `0,${height/2} ${points} ${width},${height/2} 0,${height/2}`;
        const blackPolygon = `0,${height/2} ${points} ${width},${height/2} 0,${height/2}`;

        const cursorX = ((currentMoveIndex + 1) / Math.max(1, evalCurve.length - 1)) * 100;

        const handleMouseMove = (e) => {
          const rect = e.currentTarget.getBoundingClientRect();
          const xPercent = (e.clientX - rect.left) / rect.width;
          const targetMove = Math.round(xPercent * (evalCurve.length - 1)) - 1;
          setHoveredMoveIndex(Math.max(-1, Math.min(targetMove, evalCurve.length - 2)));
        };

        const handleGraphClick = (e) => {
          const rect = e.currentTarget.getBoundingClientRect();
          const xPercent = (e.clientX - rect.left) / rect.width;
          const targetMove = Math.round(xPercent * (evalCurve.length - 1)) - 1;
          goToMove(targetMove);
        };

        const safeHoverVal = hoveredMoveIndex !== null && evalCurve[hoveredMoveIndex + 1] !== undefined ? evalCurve[hoveredMoveIndex + 1] : 0;

        return (
          <div 
            className={`w-full h-28 md:h-32 ${t.panelInner} rounded-lg border ${t.border} relative mt-4 shadow-inner cursor-pointer overflow-hidden`}
            onClick={handleGraphClick}
            onMouseMove={handleMouseMove}
            onMouseLeave={() => setHoveredMoveIndex(null)}
          >
            <svg viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" className="w-full h-full absolute inset-0">
              <clipPath id="top-half"><rect x="0" y="0" width={width} height={height/2} /></clipPath>
              <clipPath id="bottom-half"><rect x="0" y={height/2} width={width} height={height/2} /></clipPath>
              
              <polygon points={whitePolygon} fill={t.evalTop} clipPath="url(#top-half)" />
              <polygon points={blackPolygon} fill={t.evalBot} clipPath="url(#bottom-half)" />
              
              <line x1="0" y1={height/2} x2={width} y2={height/2} stroke="rgba(128,128,128,0.2)" strokeWidth="2" strokeDasharray="5,5" />
            </svg>

            {history.map((move, i) => {
              if (!move || !move.quality || !['clown', 'bad', 'strange', 'sigma', 'awesome'].includes(move.quality.id)) return null;
              const xPercent = ((i + 1) / Math.max(1, evalCurve.length - 1)) * 100;
              const yPercent = 50 - ((evalCurve[i+1] || 0) / 8) * 50;
              
              return (
                <div 
                  key={`badge_${i}`} 
                  className="absolute w-4 h-4 rounded-full flex items-center justify-center text-white font-black text-[8px] border-[1.5px] border-white shadow-lg pointer-events-none z-10"
                  style={{ left: `${xPercent}%`, top: `${yPercent}%`, transform: 'translate(-50%, -50%)', backgroundColor: move.quality.color }}
                >
                  {move.quality.icon}
                </div>
              )
            })}

            <div 
              className={`absolute top-0 bottom-0 w-[2px] ${t.accent} shadow-[0_0_8px_currentColor] pointer-events-none transition-all duration-100 ease-out z-20`}
              style={{ left: `${cursorX}%`, transform: 'translateX(-50%)' }}
            ></div>

            {hoveredMoveIndex !== null && hoveredMoveIndex >= 0 && (
              <>
                <div 
                  className="absolute top-0 bottom-0 w-px bg-white/30 pointer-events-none z-20"
                  style={{ left: `${((hoveredMoveIndex + 1) / Math.max(1, evalCurve.length - 1)) * 100}%` }}
                ></div>
                <div 
                  className="absolute z-30 pointer-events-none bg-black/90 text-white text-[10px] px-2 py-1 rounded shadow-xl font-bold whitespace-nowrap transform -translate-x-1/2 -translate-y-full border border-white/20"
                  style={{
                    left: `${((hoveredMoveIndex + 1) / Math.max(1, evalCurve.length - 1)) * 100}%`,
                    top: `${Math.max(10, Math.min(90, 50 - (safeHoverVal / 8) * 50))}%`,
                    marginTop: '-12px'
                  }}
                >
                  {history[hoveredMoveIndex]?.san || 'Start'}<br/>
                  <span className={safeHoverVal >= 0 ? 'text-green-400' : 'text-red-400'}>
                    {safeHoverVal > 0 ? '+' : ''}{Number(safeHoverVal).toFixed(1)}
                  </span>
                </div>
              </>
            )}
          </div>
        );
      };

      const PlayerBanner = ({ name, rating, capturedPieces, advantage, isBottom }) => (
        <div className={`w-full max-w-[500px] flex justify-between items-center py-2`}>
          <div className="flex items-center gap-3">
            <Avatar username={name} size={10} bgClass={t.panelInner} />
            <div className="flex flex-col">
              <span className={`font-bold text-sm ${t.text} flex items-center gap-2`}>
                {name} <span className={`text-[11px] font-medium ${t.textMuted}`}>({rating})</span>
              </span>
              <div className="flex items-center gap-[2px] h-4 mt-0.5">
                 {capturedPieces.map((p, i) => (
                    <img key={i} src={`https://images.chesscomfiles.com/chess-themes/pieces/neo/150/${isBottom ? 'b' : 'w'}${p}.png`} className="w-3.5 h-3.5 opacity-90 drop-shadow-sm" alt={p}/>
                 ))}
                 {advantage > 0 && <span className={`text-[11px] font-bold ml-1 ${t.textMuted}`}>+{advantage}</span>}
              </div>
            </div>
          </div>
          <div className={`flex items-center gap-2 text-lg font-mono font-bold ${t.panelInner} ${t.text} border ${t.border} px-3 py-1 rounded-md shadow-sm`}>
            15:00
          </div>
        </div>
      );

      const ProgressBar = ({ label, value, max=100, isWhite=true }) => {
         const pct = Math.min(100, Math.max(0, (value/max)*100));
         const colorClass = isWhite ? 'bg-white text-black' : 'bg-[#222] text-[#e3e3e3] border border-[#444]';
         const barColor = isWhite ? 'bg-gradient-to-r from-gray-300 to-white' : 'bg-gradient-to-r from-gray-600 to-gray-300';
         
         return (
            <div className="flex flex-col flex-1 items-center text-center">
               <span className={`text-3xl font-black ${t.text} mb-2`}>{value}{max===100?'%':''}</span>
               <div className="h-2 w-full bg-black/40 dark:bg-white/5 rounded-full overflow-hidden shadow-inner mb-2.5">
                 <div className={`h-full rounded-full ${barColor} shadow-[0_0_10px_rgba(255,255,255,0.1)] transition-all duration-1000 ease-out`} style={{width: `${pct}%`}}></div>
               </div>
               <span className={`text-[10px] font-bold px-4 py-1 rounded shadow-sm ${colorClass} w-full truncate`}>{label}</span>
            </div>
         )
      };

      return (
        <div className={`min-h-screen ${t.bg} font-sans flex flex-col relative overflow-x-hidden`}>
          
          {/* Global Mouse Light Effect */}
          <MouseGlow appTheme={appTheme} />

          {/* Background Effect for Home */}
          {view === 'home' && <FloatingPiecesBackground appTheme={appTheme} />}

          {/* Navbar */}
          <nav className={`w-full ${t.panel} ${t.border} border-b py-3 px-6 flex justify-between items-center shrink-0 shadow-sm z-50 relative`}>
            <div className="flex items-center gap-2 cursor-pointer group" onClick={() => setView('home')}>
              <div className={`w-8 h-8 rounded ${t.accent} flex items-center justify-center transition-transform group-hover:scale-110 group-hover:rotate-12 ${appTheme==='neon'?'text-black':'text-white'}`}><Brain size={18} /></div>
              <span className={`font-black text-lg ${t.text}`}>Grandmaster OS</span>
            </div>
            <div className="relative">
              <button onClick={() => setShowSettings(!showSettings)} className={`p-2 rounded-full hover:bg-black/10 dark:hover:bg-white/10 ${t.textMuted} transition-all`}>
                <Settings size={20} />
              </button>
              {showSettings && (
                <div className={`absolute top-12 right-0 w-64 ${t.panel} ${t.border} border rounded-xl shadow-2xl p-4 z-50`}>
                  <h4 className={`text-xs font-bold uppercase tracking-wider mb-3 ${t.textMuted}`}>Theme</h4>
                  <div className="flex gap-2 mb-4">
                    <button onClick={()=>setAppTheme('dark')} className={`flex-1 p-2 rounded border ${appTheme==='dark'?`${t.accent} text-white border-transparent`:`${t.border} ${t.text}`} text-xs font-bold`}><Moon size={14} className="mx-auto mb-1"/>Dark</button>
                    <button onClick={()=>setAppTheme('light')} className={`flex-1 p-2 rounded border ${appTheme==='light'?`${t.accent} text-white border-transparent`:`${t.border} ${t.text}`} text-xs font-bold`}><Sun size={14} className="mx-auto mb-1"/>Light</button>
                    <button onClick={()=>setAppTheme('neon')} className={`flex-1 p-2 rounded border ${appTheme==='neon'?`${t.accent} text-black border-transparent`:`${t.border} ${t.text}`} text-xs font-bold`}><Zap size={14} className="mx-auto mb-1"/>Neon</button>
                  </div>
                  <h4 className={`text-xs font-bold uppercase tracking-wider mb-3 ${t.textMuted}`}>Board Style</h4>
                  <div className="grid grid-cols-2 gap-2">
                    {Object.keys(BOARD_THEMES).map(btName => (
                      <button 
                        key={btName}
                        onClick={()=>setBoardTheme(btName)}
                        className={`flex items-center gap-2 p-2 rounded border ${boardTheme===btName?`${t.accent} text-white border-transparent`:`${t.border} ${t.text}`} text-xs font-bold capitalize`}
                      >
                        <div className="w-4 h-4 rounded-sm flex">
                          <div className={`w-2 h-full ${BOARD_THEMES[btName].light}`}></div>
                          <div className={`w-2 h-full ${BOARD_THEMES[btName].dark}`}></div>
                        </div>
                        {btName}
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </nav>
          
          {/* Main View Area */}
          <div className="flex-1 w-full max-w-[1500px] mx-auto p-4 md:p-6 flex flex-col z-10">
            
            {view === "home" ? (
              <div className="w-full flex-1 flex flex-col pb-10">
                 {games.length === 0 ? (
                   <div className="flex flex-col items-center justify-center min-h-[70vh] text-center relative z-10 w-full max-w-4xl mx-auto">
                     <div className={`w-28 h-28 rounded-[2rem] ${t.panelInner} flex items-center justify-center mb-8 border ${t.border} shadow-2xl backdrop-blur-xl bg-opacity-80 transition-transform duration-500 hover:scale-110 hover:rotate-3`}>
                       <Shield size={56} className={t.accentText} />
                     </div>
                     <h1 className={`text-4xl md:text-6xl font-black ${t.text} mb-4 tracking-tight drop-shadow-lg`}>Elevate Your Game</h1>
                     <p className={`text-base md:text-lg ${t.textMuted} max-w-lg mb-10 leading-relaxed drop-shadow`}>Enter any Chess.com username to instantly analyze archives with Stockfish. Reveal your brilliant moves and correct critical blunders.</p>
                     
                     <div className="relative w-full max-w-md flex flex-col gap-3 group">
                        <div className="relative transform transition-all duration-300 group-hover:scale-105">
                          <Search className={`absolute left-4 top-1/2 -translate-y-1/2 ${t.textMuted}`} size={20} />
                          <input 
                            className={`w-full ${t.panelInner} border border-transparent focus:border-[${t.accentText.split('-')[1]}] rounded-xl py-4 pl-12 pr-4 ${t.text} text-base font-medium placeholder:${t.textMuted} focus:outline-none shadow-xl transition-all duration-300 bg-opacity-90`}
                            placeholder="Search Username (e.g. hikaru)"
                            value={username}
                            onChange={(e) => { setUsername(e.target.value); setError(""); }}
                            onKeyDown={(e) => e.key === 'Enter' && fetchGames()}
                          />
                        </div>
                        <button onClick={fetchGames} className={`w-full ${t.accent} ${appTheme==='neon'?'text-black':'text-white'} px-4 py-4 rounded-xl text-base font-black uppercase tracking-widest hover:brightness-110 flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(0,0,0,0.2)] transition-all duration-300 active:scale-95 group-hover:scale-105`}>
                          {loading ? <Loader2 size={20} className="animate-spin" /> : "Sync Archives"}
                        </button>
                     </div>

                     {error && (
                        <div className="mt-6 text-center animate-fade-in w-full">
                          <p className="text-[#ca3431] text-sm font-bold tracking-wide bg-[#ca3431]/10 inline-block px-4 py-2 rounded-lg border border-[#ca3431]/20">
                            {error}
                          </p>
                        </div>
                      )}

                     {/* Interactive Feature Cards */}
                     <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-20 w-full max-w-5xl mx-auto px-4 z-10 relative">
                        <div className={`p-6 rounded-2xl ${t.panelInner} border ${t.border} hover:-translate-y-2 hover:scale-105 hover:shadow-[0_10px_30px_rgba(129,182,76,0.15)] transition-all duration-300 group cursor-pointer text-left`}>
                          <div className="w-12 h-12 rounded-full bg-[#81b64c]/10 flex items-center justify-center mb-4 group-hover:scale-110 group-hover:rotate-12 transition-transform">
                            <Cpu className="text-[#81b64c]" size={24} />
                          </div>
                          <h3 className={`text-lg font-black ${t.text} mb-2`}>Edge Analysis</h3>
                          <p className={`text-sm ${t.textMuted} leading-relaxed`}>Powered by WebAssembly Stockfish 10. Runs entirely in your browser with zero latency and full privacy.</p>
                        </div>
                        <div className={`p-6 rounded-2xl ${t.panelInner} border ${t.border} hover:-translate-y-2 hover:scale-105 hover:shadow-[0_10px_30px_rgba(6,182,212,0.15)] transition-all duration-300 group cursor-pointer text-left`}>
                          <div className="w-12 h-12 rounded-full bg-cyan-500/10 flex items-center justify-center mb-4 group-hover:scale-110 group-hover:-rotate-12 transition-transform">
                            <CloudLightning className="text-cyan-500" size={24} />
                          </div>
                          <h3 className={`text-lg font-black ${t.text} mb-2`}>Instant Import</h3>
                          <p className={`text-sm ${t.textMuted} leading-relaxed`}>Connect directly to Chess.com's public API. Instantly retrieve your latest matches across all time controls.</p>
                        </div>
                        <div className={`p-6 rounded-2xl ${t.panelInner} border ${t.border} hover:-translate-y-2 hover:scale-105 hover:shadow-[0_10px_30px_rgba(239,68,68,0.15)] transition-all duration-300 group cursor-pointer text-left`}>
                          <div className="w-12 h-12 rounded-full bg-red-500/10 flex items-center justify-center mb-4 group-hover:scale-110 group-hover:rotate-12 transition-transform">
                            <Crosshair className="text-red-500" size={24} />
                          </div>
                          <h3 className={`text-lg font-black ${t.text} mb-2`}>Smart Branches</h3>
                          <p className={`text-sm ${t.textMuted} leading-relaxed`}>Play alternative moves dynamically. Create variations and let the engine instantly evaluate your custom lines.</p>
                        </div>
                     </div>
                   </div>
                 ) : (
                   <div className="animate-in slide-in-from-bottom-4 relative z-10 w-full max-w-4xl mx-auto">
                     <div className="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-6 p-4 rounded-2xl bg-black/10 dark:bg-white/5 border border-white/5 backdrop-blur-md">
                        <h1 className={`text-xl font-bold ${t.text} flex items-center gap-2`}>
                          <Swords size={20} className={t.accentText} /> 
                          Match Archives: <span className={`${t.accent} ${appTheme==='neon'?'text-black':'text-white'} px-3 py-1 shadow-md rounded-lg ml-1`}>{username}</span>
                        </h1>
                        <div className="flex flex-col items-end relative">
                          <div className="flex gap-2">
                            <div className="relative">
                              <Search className={`absolute left-3 top-1/2 -translate-y-1/2 ${t.textMuted}`} size={14} />
                              <input 
                                className={`w-40 md:w-56 ${t.panelInner} border ${t.border} rounded-lg py-2 pl-9 pr-4 ${t.text} text-sm font-medium placeholder:${t.textMuted} focus:outline-none focus:border-[${t.accentText.split('-')[1]}] transition-colors`}
                                placeholder="Search..."
                                value={username}
                                onChange={(e) => { setUsername(e.target.value); setError(""); }}
                                onKeyDown={(e) => e.key === 'Enter' && fetchGames()}
                              />
                            </div>
                            <button onClick={fetchGames} className={`${t.panelInner} ${t.text} border ${t.border} px-4 py-2 rounded-lg text-sm font-bold hover:brightness-110 flex items-center gap-2 transition-all active:scale-95 shadow-sm`}>
                              {loading ? <Loader2 size={16} className="animate-spin" /> : <RefreshCcw size={16}/>}
                            </button>
                          </div>
                          {error && (
                            <div className="absolute top-full right-0 mt-3 whitespace-nowrap bg-[#ca3431]/10 border border-[#ca3431]/30 px-3 py-2 rounded-lg flex items-center gap-2 animate-pop shadow-lg backdrop-blur-md z-50">
                              <AlertTriangle className="text-[#ca3431]" size={14} strokeWidth={2.5} />
                              <span className="text-[#ca3431] text-[10px] font-bold tracking-wider">
                                {error}
                              </span>
                            </div>
                          )}
                        </div>
                     </div>

                     {/* Grid View for Games (2 per row) */}
                     <div className="grid grid-cols-1 md:grid-cols-2 gap-5 pb-10">
                        {games.map((g, idx) => {
                          const date = new Date(g.end_time * 1000);
                          const isUserWhite = g.white.username.toLowerCase() === username.toLowerCase();
                          const userResult = isUserWhite ? g.white.result : g.black.result;
                          
                          let resultText = 'Draw';
                          let ResultIcon = null;
                          let resultStyle = appTheme === 'light' 
                            ? `bg-gray-100 text-gray-600 border border-gray-200` 
                            : `bg-[#2b2b2b] text-[#8c8c8c] border-transparent`;
                          
                          if (userResult === 'win') {
                            resultText = 'Win';
                            ResultIcon = CheckCircle;
                            resultStyle = appTheme === 'light'
                              ? `bg-green-50 text-green-700 border border-green-200`
                              : `bg-[#384833] text-[#7fa650] border-transparent`;
                          } else if (['checkmated', 'timeout', 'resigned', 'abandoned', 'lose'].includes(userResult)) {
                            resultText = 'Loss';
                            ResultIcon = XCircle;
                            resultStyle = appTheme === 'light'
                              ? `bg-red-50 text-red-700 border border-red-200`
                              : `bg-[#4b2f2d] text-[#cc544b] border-transparent`;
                          }

                          // Calculate total moves from PGN
                          const movesMatch = g.pgn.match(/\d+\./g);
                          const moveCount = movesMatch ? movesMatch.length : '?';

                          return (
                            <div 
                              key={idx} 
                              onClick={() => loadGame(g)}
                              className={`relative p-5 rounded-2xl border ${t.border} ${t.panelInner} hover:scale-[1.02] hover:-translate-y-1 transition-all duration-300 cursor-pointer shadow-lg overflow-hidden group`}
                            >
                              {/* Header: Result Badge & Time/Date */}
                              <div className="flex justify-between items-start mb-5">
                                <div className="flex flex-col items-center gap-1.5">
                                  <div className={`flex items-center gap-1.5 text-xs font-bold px-3 py-1.5 rounded-md ${resultStyle}`}>
                                    {ResultIcon && <ResultIcon size={14} strokeWidth={2.5} />}
                                    {resultText}
                                  </div>
                                  <span className={`text-[11px] ${t.textMuted} font-medium`}>Rated</span>
                                </div>
                                <div className={`text-right ${t.textMuted}`}>
                                  <div className={`text-sm font-bold flex items-center gap-1.5 justify-end ${t.text}`}><Clock size={14}/> {g.time_class}</div>
                                  <div className="text-[10px] uppercase tracking-widest mt-1 opacity-70">{date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric'})}</div>
